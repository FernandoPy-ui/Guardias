<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolución Guardias — Últimos 6 Meses</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --panel: #13161e;
    --border: #1f2330;
    --accent: #e8c547;
    --accent2: #4fd1c5;
    --red: #f56565;
    --green: #68d391;
    --text: #e2e8f0;
    --muted: #718096;
    --card: #181b25;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  header {
    background: linear-gradient(135deg, #13161e 0%, #1a1f2e 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-family:'Bebas Neue'; font-size:2.2rem; letter-spacing:3px; color:var(--accent); }
  header p { color:var(--muted); font-size:.85rem; margin-top:2px; }
  .badge { background:var(--accent); color:#000; font-size:.7rem; font-weight:600; padding:4px 10px; border-radius:20px; letter-spacing:1px; }

  .controls {
    padding: 20px 40px;
    display: flex; flex-wrap:wrap; gap:12px; align-items:center;
    border-bottom:1px solid var(--border);
  }
  .search-box {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:8px 14px; color:var(--text); font-size:.85rem; font-family:'DM Sans';
    outline:none; width:280px; transition:.2s;
  }
  .search-box:focus { border-color:var(--accent); }
  .search-box::placeholder { color:var(--muted); }

  .filter-btn {
    background:var(--card); border:1px solid var(--border); color:var(--muted);
    padding:8px 14px; border-radius:8px; cursor:pointer; font-family:'DM Sans'; font-size:.8rem;
    transition:.2s; white-space:nowrap;
  }
  .filter-btn:hover, .filter-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }

  .sort-label { color:var(--muted); font-size:.8rem; margin-left:8px; }
  select.sort-select {
    background:var(--card); border:1px solid var(--border); color:var(--text);
    padding:8px 12px; border-radius:8px; font-family:'DM Sans'; font-size:.8rem; outline:none; cursor:pointer;
  }

  .stats-bar {
    display:flex; gap:0; border-bottom:1px solid var(--border);
    overflow-x:auto;
  }
  .stat { padding:16px 32px; border-right:1px solid var(--border); min-width:160px; }
  .stat .val { font-family:'Bebas Neue'; font-size:1.8rem; color:var(--accent); letter-spacing:1px; }
  .stat .lbl { font-size:.72rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

  .grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
    gap:16px; padding:24px 40px;
  }

  .card {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:20px; transition:.25s; cursor:pointer; position:relative; overflow:hidden;
  }
  .card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.4); }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .card.up::before { background: linear-gradient(90deg, var(--green), transparent); }
  .card.down::before { background: linear-gradient(90deg, var(--red), transparent); }
  .card.neutral::before { background: linear-gradient(90deg, var(--muted), transparent); }

  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .card-name { font-size:.9rem; font-weight:600; color:var(--text); line-height:1.3; max-width:260px; }
  .var-badge {
    font-size:.75rem; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap; margin-left:8px;
  }
  .var-badge.up { background:rgba(104,211,145,.15); color:var(--green); }
  .var-badge.down { background:rgba(245,101,101,.15); color:var(--red); }
  .var-badge.neutral { background:rgba(113,128,150,.15); color:var(--muted); }

  .mini-stats { display:flex; gap:20px; margin-bottom:14px; }
  .mini-stat .ms-val { font-size:.85rem; font-weight:600; color:var(--accent2); }
  .mini-stat .ms-lbl { font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }

  .chart-wrap { position:relative; height:110px; }

  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100;
    align-items:center; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--panel); border:1px solid var(--border); border-radius:16px;
    width:720px; max-width:95vw; padding:32px; position:relative;
  }
  .modal-close {
    position:absolute; top:16px; right:16px; background:none; border:none;
    color:var(--muted); font-size:1.4rem; cursor:pointer;
  }
  .modal-close:hover { color:var(--text); }
  .modal h2 { font-family:'Bebas Neue'; font-size:1.5rem; letter-spacing:2px; color:var(--accent); margin-bottom:4px; }
  .modal-chart-wrap { height:220px; margin:20px 0; }
  .detail-table { width:100%; border-collapse:collapse; font-size:.8rem; }
  .detail-table th { color:var(--muted); text-align:right; padding:6px 10px; font-weight:500; border-bottom:1px solid var(--border); }
  .detail-table th:first-child { text-align:left; }
  .detail-table td { text-align:right; padding:6px 10px; border-bottom:1px solid var(--border); }
  .detail-table td:first-child { text-align:left; color:var(--accent2); font-weight:500; }
  .detail-table tr:last-child td { border-bottom:none; }
  .detail-table .null-val { color:var(--muted); font-style:italic; }

  .empty { text-align:center; padding:60px; color:var(--muted); font-size:1rem; grid-column:1/-1; }

  @media(max-width:600px){
    header { padding:16px 20px; }
    .controls, .grid { padding:16px 20px; }
    .grid { grid-template-columns:1fr; }
  }
</style>
</head>

<header>
  <div>
    <h1>Evolución de Guardias</h1>
    <p>Horas Totales e Ingresos — Últimos 6 meses</p>
  </div>
  <span class="badge">SEP 2025 → FEB 2026</span>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="controls">
  <input class="search-box" type="text" id="searchInput" placeholder="🔍  Buscar guardia...">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="up">▲ Subió</button>
  <button class="filter-btn" data-filter="down">▼ Bajó</button>
  <button class="filter-btn" data-filter="stable">— Estable (±5%)</button>
  <span class="sort-label">Ordenar por:</span>
  <select class="sort-select" id="sortSelect">
    <option value="nombre">Nombre A-Z</option>
    <option value="var_desc">Mayor variación ↑</option>
    <option value="var_asc">Menor variación ↓</option>
    <option value="avg_desc">Ingreso promedio ↑</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 id="modalName"></h2>

    <table class="detail-table" id="detailTable"></table>

</div>

const PERIODOS = DATA.periodos;
const PERSONAS = DATA.personas;

function fmt(n){ if(n===null||n===undefined) return 'Gs. —'; return 'Gs. ' + Math.round(n).toLocaleString('es-PY'); }
function fmtH(n){ if(n===null||n===undefined) return '—'; return n.toFixed(1) + ' h'; }
function getClass(v){ if(v===null||v===undefined) return 'neutral'; if(v>5) return 'up'; if(v<-5) return 'down'; return 'neutral'; }

function buildStats(){
  const all = Object.values(PERSONAS);
  const withVar = all.filter(p=>p.var_pct!==null);
  const ups = withVar.filter(p=>p.var_pct>5).length;
  const downs = withVar.filter(p=>p.var_pct<-5).length;
  const stable = withVar.filter(p=>Math.abs(p.var_pct)<=5).length;
  const totalAvg = all.reduce((s,p)=>s+p.avg_ing,0)/all.length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="val">${all.length}</div><div class="lbl">Total Guardias</div></div>
    <div class="stat"><div class="val" style="color:var(--green)">${ups}</div><div class="lbl">Con Incremento</div></div>
    <div class="stat"><div class="val" style="color:var(--red)">${downs}</div><div class="lbl">Con Baja</div></div>
    <div class="stat"><div class="val" style="color:var(--muted)">${stable}</div><div class="lbl">Estables (±5%)</div></div>
    <div class="stat"><div class="val">Gs. ${(totalAvg/1000000).toFixed(1)}M</div><div class="lbl">Ingreso Prom. General</div></div>`;
}

let activeFilter='all', activeSort='nombre', searchVal='';
let miniCharts={};

function buildCards(){
  Object.values(miniCharts).forEach(c=>c.destroy()); miniCharts={};
  let entries = Object.entries(PERSONAS).map(([k,v])=>({name:k,...v}));
  if(searchVal) entries=entries.filter(e=>e.name.toLowerCase().includes(searchVal.toLowerCase()));
  if(activeFilter==='up') entries=entries.filter(e=>e.var_pct!==null&&e.var_pct>5);
  if(activeFilter==='down') entries=entries.filter(e=>e.var_pct!==null&&e.var_pct<-5);
  if(activeFilter==='stable') entries=entries.filter(e=>e.var_pct!==null&&Math.abs(e.var_pct)<=5);
  if(activeSort==='nombre') entries.sort((a,b)=>a.name.localeCompare(b.name));
  if(activeSort==='var_desc') entries.sort((a,b)=>(b.var_pct||0)-(a.var_pct||0));
  if(activeSort==='var_asc') entries.sort((a,b)=>(a.var_pct||0)-(b.var_pct||0));
  if(activeSort==='avg_desc') entries.sort((a,b)=>b.avg_ing-a.avg_ing);

  const grid=document.getElementById('grid');
  if(!entries.length){grid.innerHTML='<div class="empty">No se encontraron guardias con los filtros aplicados.</div>';return;}

  grid.innerHTML=entries.map(e=>{
    const cls=getClass(e.var_pct);
    const varStr=e.var_pct===null?'Sin datos suficientes':(e.var_pct>0?'+':'')+e.var_pct+'%';
    const ingValid=e.ingresos.filter(x=>x!==null);
    const hValid=e.horas.filter(x=>x!==null);
    const lastIng=ingValid[ingValid.length-1];
    const lastH=hValid[hValid.length-1];
    const safeId='c_'+e.name.replace(/[^a-zA-Z0-9]/g,'_');
    return `<div class="card ${cls}" data-name="${e.name}">
      <div class="card-header">
        <div class="card-name">${e.name}</div>
        <span class="var-badge ${cls}">${varStr}</span>
      </div>
      <div class="mini-stats">
        <div class="mini-stat"><div class="ms-val">${fmt(lastIng)}</div><div class="ms-lbl">Último ingreso</div></div>
        <div class="mini-stat"><div class="ms-val">${fmtH(lastH)}</div><div class="ms-lbl">Últimas horas</div></div>
        <div class="mini-stat"><div class="ms-val">Gs. ${(e.avg_ing/1000000).toFixed(1)}M</div><div class="ms-lbl">Prom. ingreso</div></div>
      </div>
      <div class="chart-wrap"><canvas id="${safeId}"></canvas></div>
    </div>`;
  }).join('');

  entries.forEach(e=>{
    const safeId='c_'+e.name.replace(/[^a-zA-Z0-9]/g,'_');
    const canvas=document.getElementById(safeId); if(!canvas) return;
    const chart=new Chart(canvas,{type:'line',data:{labels:PERIODOS,datasets:[
      {label:'Ingresos',data:e.ingresos,borderColor:'#e8c547',backgroundColor:'rgba(232,197,71,.08)',pointBackgroundColor:'#e8c547',pointRadius:3,borderWidth:2,tension:.4,yAxisID:'y',spanGaps:false},
      {label:'Horas',data:e.horas,borderColor:'#4fd1c5',backgroundColor:'rgba(79,209,197,.05)',pointBackgroundColor:'#4fd1c5',pointRadius:3,borderWidth:1.5,tension:.4,yAxisID:'y2',spanGaps:false,borderDash:[4,3]}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},
    scales:{x:{ticks:{color:'#718096',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},y:{display:false},y2:{display:false}}}});
    miniCharts[safeId]=chart;
  });

  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',()=>openModal(card.dataset.name));
  });
}

let modalChartInst=null;
function openModal(name){
  const e=PERSONAS[name];
  document.getElementById('modalName').textContent=name;
  const cls=getClass(e.var_pct);
  const varStr=e.var_pct===null?'Sin variación calculable':(e.var_pct>0?'▲ Incremento de +':'▼ Baja de ')+Math.abs(e.var_pct)+'% (primer al último mes con datos)';
  document.getElementById('modalSub').textContent=varStr;
  const rows=PERIODOS.map((p,i)=>`<tr>
    <td>${p}</td>
    <td>${e.horas[i]!==null?e.horas[i].toFixed(1)+' h':'<span class="null-val">sin datos</span>'}</td>
    <td>${e.ingresos[i]!==null?'Gs. '+Math.round(e.ingresos[i]).toLocaleString('es-PY'):'<span class="null-val">sin datos</span>'}</td>
  </tr>`).join('');
  document.getElementById('detailTable').innerHTML=`<thead><tr><th>Período</th><th>Horas Tot.</th><th>Total Ingresos</th></tr></thead><tbody>${rows}</tbody>`;
  if(modalChartInst){modalChartInst.destroy();}
  const ctx=document.getElementById('modalChart').getContext('2d');
  modalChartInst=new Chart(ctx,{type:'bar',data:{labels:PERIODOS,datasets:[
    {label:'Ingresos (Gs.)',data:e.ingresos,backgroundColor:'rgba(232,197,71,.3)',borderColor:'#e8c547',borderWidth:2,type:'bar',yAxisID:'y'},
    {label:'Horas',data:e.horas,borderColor:'#4fd1c5',backgroundColor:'rgba(79,209,197,0)',pointBackgroundColor:'#4fd1c5',pointRadius:5,borderWidth:2.5,tension:.4,type:'line',yAxisID:'y2',spanGaps:false}
  ]},options:{responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{color:'#a0aec0',font:{size:11}}}},
  scales:{
    x:{ticks:{color:'#a0aec0'},grid:{color:'rgba(255,255,255,.05)'}},
    y:{ticks:{color:'#e8c547',callback:v=>'Gs. '+(v/1000000).toFixed(1)+'M'},grid:{color:'rgba(255,255,255,.05)'},position:'left'},
    y2:{ticks:{color:'#4fd1c5',callback:v=>v+'h'},grid:{display:false},position:'right'}
  }}});
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open');});
document.getElementById('searchInput').addEventListener('input',e=>{searchVal=e.target.value;buildCards();});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); activeFilter=btn.dataset.filter; buildCards();
  });
});
document.getElementById('sortSelect').addEventListener('change',e=>{activeSort=e.target.value;buildCards();});

buildStats();
buildCards();
</script>
</body>
</html>
