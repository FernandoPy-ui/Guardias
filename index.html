<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolución Guardias — Ene 2025 · Feb 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0e14; --surface:#131720; --surface2:#1a1f2e; --surface3:#1e2535;
  --border:#252d3d; --border2:#2e3850;
  --accent:#4fffb0; --accent-dim:rgba(79,255,176,.12);
  --red:#ff6b6b; --red-dim:rgba(255,107,107,.12);
  --yellow:#f7c948; --purple:#a78bfa;
  --text:#e8eaf0; --muted:#6b7494; --muted2:#4a5270;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
header{padding:28px 36px 20px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,#0d1220 0%,var(--bg) 100%);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hd-title h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.hd-title h1 em{color:var(--accent);font-style:normal}
.hd-title p{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px;letter-spacing:.4px}
.hd-stats{display:flex;gap:20px;flex-wrap:wrap}
.hs{text-align:right}
.hs-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)}
.hs-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}

/* ── VIEW TOGGLE ── */
.view-bar{padding:14px 36px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.vbtn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.6px}
.vbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.vbtn.active{background:var(--accent);color:#0b0e14;border-color:var(--accent)}
.vbtn:not(.active):hover{border-color:var(--accent);color:var(--accent)}
.vbar-sep{width:1px;height:28px;background:var(--border);margin:0 4px}

/* ── CONTROLS ── */
.controls{padding:16px 36px;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface2)}
.ctrl-group{display:flex;flex-direction:column;gap:6px}
.ctrl-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:'DM Mono',monospace}

/* search */
.search-wrap{position:relative}
.search-wrap input{width:260px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 34px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}

/* month pills */
.month-pills{display:flex;gap:4px;flex-wrap:wrap;max-width:760px}
.mpill{padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none}
.mpill:hover{border-color:var(--accent);color:var(--accent)}
.mpill.active{background:var(--accent);color:#0b0e14;border-color:var(--accent)}
.mpill.pill-all{font-weight:700}

/* filter + sort row */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fbtn{padding:6px 13px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:all .12s;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.fa{background:var(--accent);color:#0b0e14;border-color:var(--accent)}
.fbtn.fu{background:rgba(79,255,176,.15);color:var(--accent);border-color:rgba(79,255,176,.3)}
.fbtn.fd{background:rgba(255,107,107,.15);color:var(--red);border-color:rgba(255,107,107,.3)}
select.sort-sel{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:7px 11px;outline:none;cursor:pointer;margin-left:auto}

/* ── CONTENT ── */
.content{padding:20px 36px 48px}
.rcount{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:14px}
.rcount span{color:var(--accent)}

/* ══ CARDS VIEW ══ */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(580px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.expanded{border-color:var(--accent)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;gap:10px}
.card-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-family:'DM Mono',monospace;font-size:12px;padding:3px 9px;border-radius:5px;white-space:nowrap}
.b-up{background:rgba(79,255,176,.1);color:var(--accent);border:1px solid rgba(79,255,176,.2)}
.b-down{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.2)}
.b-neutral{background:rgba(107,116,148,.1);color:var(--muted);border:1px solid rgba(107,116,148,.2)}

/* sparkline row */
.card-spark{display:flex;padding:0 18px;overflow-x:auto;scrollbar-width:none}
.card-spark::-webkit-scrollbar{display:none}
.sp-cell{flex:1;min-width:66px;padding:7px 4px 12px;text-align:center;border-top:1px solid var(--border);position:relative}
.sp-lbl{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;white-space:nowrap}
.sp-htt{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:1px}
.sp-ing{font-size:11px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text)}
.sp-cell.empty{opacity:.2}
.bar-bg{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border)}
.bar-fill{height:100%;border-radius:2px}

/* expanded detail */
.card-detail{display:none;border-top:1px solid var(--border);background:var(--surface2);padding:14px 18px 18px}
.card.expanded .card-detail{display:block}
.det-tabs{display:flex;gap:5px;margin-bottom:10px}
.dtab{padding:4px 11px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.5px}
.dtab.active{background:var(--accent);color:#0b0e14;border-color:var(--accent)}
.det-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.dstat{background:var(--surface);padding:9px 12px;text-align:center}
.dstat-val{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)}
.dstat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.chart-wrap{height:150px;position:relative}

/* ══ TABLE VIEW ══ */
#table-view{display:none}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px;min-width:700px}
thead tr{background:var(--surface2);border-bottom:2px solid var(--border)}
thead th{padding:10px 14px;text-align:right;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s}
thead th:first-child{text-align:left}
thead th:hover{color:var(--accent)}
thead th.sort-asc::after{content:' ▲';color:var(--accent)}
thead th.sort-desc::after{content:' ▼';color:var(--accent)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 14px;text-align:right;color:var(--text);vertical-align:middle}
td:first-child{text-align:left;color:var(--text);font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.td-mes{color:var(--muted);font-size:11px}
.td-var{font-weight:700}
.td-var.up{color:var(--accent)}
.td-var.down{color:var(--red)}
.td-neto{color:var(--yellow);font-weight:600}
tfoot td{background:var(--surface2);padding:10px 14px;color:var(--accent);font-weight:700;border-top:2px solid var(--border)}
tfoot td:first-child{text-align:left;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.7px}

/* empty */
.empty-msg{text-align:center;padding:48px;color:var(--muted);font-size:13px}

/* responsive */
@media(max-width:660px){
  header,.controls,.content,.view-bar{padding-left:14px;padding-right:14px}
  .cards-grid{grid-template-columns:1fr}
  .hd-stats{display:none}
  .det-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header>
  <div class="hd-title">
    <h1>Evolución <em>Guardias</em></h1>
    <p>ENERO 2025 — FEBRERO 2026 &nbsp;·&nbsp; 14 meses · datos completos</p>
  </div>
  <div class="hd-stats">
    <div class="hs"><div class="hs-val" id="s-total">55</div><div class="hs-lbl">Guardias</div></div>
    <div class="hs"><div class="hs-val" id="s-up">—</div><div class="hs-lbl">Con alza</div></div>
    <div class="hs"><div class="hs-val" id="s-down">—</div><div class="hs-lbl">Con baja</div></div>
    <div class="hs"><div class="hs-val" id="s-ing">—</div><div class="hs-lbl">Total ing. período</div></div>
  </div>
</header>

<!-- VIEW TOGGLE -->
<div class="view-bar">
  <button class="vbtn active" id="btn-cards" onclick="switchView('cards')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Tarjetas
  </button>
  <button class="vbtn" id="btn-table" onclick="switchView('table')">
    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    Resumen tabla
  </button>
  <div class="vbar-sep"></div>
  <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace" id="sel-info">Todos los meses seleccionados</span>
</div>

<!-- CONTROLS -->
<div class="controls">
  <!-- Month pills -->
  <div class="ctrl-group" style="flex:1;min-width:280px">
    <div class="ctrl-label">Filtrar por mes</div>
    <div class="month-pills" id="month-pills"></div>
  </div>
  <!-- Search + filters -->
  <div class="ctrl-group">
    <div class="ctrl-label">Buscar guardia</div>
    <div class="search-wrap"><input type="text" id="search" placeholder="Nombre..." oninput="render()"></div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Filtro variación</div>
    <div class="filter-row">
      <button class="fbtn fa" onclick="setFilter('all',this)">Todos</button>
      <button class="fbtn" onclick="setFilter('up',this)">▲ Alza</button>
      <button class="fbtn" onclick="setFilter('down',this)">▼ Baja</button>
      <button class="fbtn" onclick="setFilter('high',this)">±&gt;20%</button>
    </div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">Ordenar</div>
    <select class="sort-sel" id="sortby" onchange="render()">
      <option value="nombre">Nombre A→Z</option>
      <option value="var-desc">Variación ▼</option>
      <option value="var-asc">Variación ▲</option>
      <option value="ing-desc">Ingresos totales ▼</option>
      <option value="htt-desc">Horas totales ▼</option>
    </select>
  </div>
</div>

<div class="content">
  <div class="rcount" id="rcount"></div>
  <!-- CARDS -->
  <div id="cards-view">
    <div class="cards-grid" id="grid"></div>
    <div class="empty-msg" id="empty" style="display:none">Sin resultados.</div>
  </div>
  <!-- TABLE -->
  <div id="table-view" style="display:none">
    <div class="tbl-wrap"><table id="tbl"><thead></thead><tbody></tbody><tfoot></tfoot></table></div>
    <div class="empty-msg" id="empty-tbl" style="display:none">Sin resultados.</div>
  </div>
</div>

/* ═══════════════════════════════ STATE ═══════════════════════════════ */
let selectedMonths = new Set(ALL_PERIODOS);   // all selected by default
let filterMode = 'all';
let currentView = 'cards';
let tblSortCol = 'nombre';
let tblSortDir = 'asc';
let charts = {};

/* ═══════════════════════════════ HELPERS ═══════════════════════════════ */
const fmt = n => n==null?'—':new Intl.NumberFormat('es-PY',{maximumFractionDigits:0}).format(n);
const fmtM = n => n==null?'—':'Gs '+new Intl.NumberFormat('es-PY',{maximumFractionDigits:0}).format(n);
const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

function getActivePeriodos() {
  return ALL_PERIODOS.filter(p => selectedMonths.has(p));
}

/* compute per-person aggregated data for selected months */
function getPersonData(p) {
  const active = getActivePeriodos();
  const vals = active.map(per => p.meses[per]).filter(Boolean);
  if (!vals.length) return null;
  const totalIng = vals.reduce((s,v)=>s+v.ingresos,0);
  const totalNeto = vals.reduce((s,v)=>s+v.neto,0);
  const totalHtt = vals.reduce((s,v)=>s+v.htt,0);
  // variation: first vs last month with data in active range
  const withData = active.filter(per=>p.meses[per]);
  let varPct = 0;
  if (withData.length>=2) {
    const first = p.meses[withData[0]].ingresos;
    const last  = p.meses[withData[withData.length-1]].ingresos;
    varPct = first>0 ? Math.round((last-first)/first*1000)/10 : 0;
  }
  return {totalIng,totalNeto,totalHtt,varPct,monthsCount:vals.length};
}

/* ═══════════════════════════════ MONTH PILLS ═══════════════════════════════ */
function buildPills() {
  const wrap = document.getElementById('month-pills');
  wrap.innerHTML = `<span class="mpill pill-all active" onclick="toggleAllMonths(this)">Todos</span>` +
    ALL_PERIODOS.map((p,i)=>`<span class="mpill active" data-p="${p}" onclick="toggleMonth(this,'${p}')">${ALL_LABELS[i]}</span>`).join('');
}

function toggleAllMonths(el) {
  const allActive = selectedMonths.size === ALL_PERIODOS.length;
  if (allActive) {
    selectedMonths.clear();
    document.querySelectorAll('.mpill[data-p]').forEach(m=>m.classList.remove('active'));
    el.textContent = 'Ninguno';
  } else {
    ALL_PERIODOS.forEach(p=>selectedMonths.add(p));
    document.querySelectorAll('.mpill[data-p]').forEach(m=>m.classList.add('active'));
    el.textContent = 'Todos';
  }
  updateSelInfo();
  render();
}

function toggleMonth(el, p) {
  if (selectedMonths.has(p)) {
    selectedMonths.delete(p);
    el.classList.remove('active');
  } else {
    selectedMonths.add(p);
    el.classList.add('active');
  }
  const allEl = document.querySelector('.pill-all');
  allEl.textContent = selectedMonths.size===ALL_PERIODOS.length?'Todos':`${selectedMonths.size} meses`;
  if(selectedMonths.size===ALL_PERIODOS.length) allEl.classList.add('active'); else allEl.classList.remove('active');
  updateSelInfo();
  render();
}

function updateSelInfo() {
  const n = selectedMonths.size;
  const el = document.getElementById('sel-info');
  if(n===ALL_PERIODOS.length) el.textContent='Todos los meses seleccionados';
  else if(n===0) el.textContent='Ningún mes seleccionado';
  else {
    const names = ALL_PERIODOS.filter(p=>selectedMonths.has(p)).map(p=>ALL_LABELS[ALL_PERIODOS.indexOf(p)]);
    el.textContent = names.join(', ');
  }
}

/* ═══════════════════════════════ FILTER/SORT ═══════════════════════════════ */
function setFilter(f, el) {
  filterMode = f;
  document.querySelectorAll('.fbtn').forEach(b=>b.className='fbtn');
  el.classList.add(f==='up'?'fu':f==='down'?'fd':'fa');
  render();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sortby').value;
  let list = RAW.personas.map(p=>{
    const d = getPersonData(p);
    return d ? {...p, _d:d} : null;
  }).filter(Boolean);

  if(q) list = list.filter(p=>p.nombre.toLowerCase().includes(q));
  if(filterMode==='up')   list = list.filter(p=>p._d.varPct>0);
  if(filterMode==='down') list = list.filter(p=>p._d.varPct<0);
  if(filterMode==='high') list = list.filter(p=>Math.abs(p._d.varPct)>=20);

  if(sort==='var-desc')  list.sort((a,b)=>b._d.varPct-a._d.varPct);
  else if(sort==='var-asc') list.sort((a,b)=>a._d.varPct-b._d.varPct);
  else if(sort==='ing-desc') list.sort((a,b)=>b._d.totalIng-a._d.totalIng);
  else if(sort==='htt-desc') list.sort((a,b)=>b._d.totalHtt-a._d.totalHtt);
  else list.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  return list;
}

/* ═══════════════════════════════ HEADER STATS ═══════════════════════════════ */
function updateHeaderStats(list) {
  document.getElementById('s-total').textContent = list.length;
  document.getElementById('s-up').textContent = list.filter(p=>p._d.varPct>0).length;
  document.getElementById('s-down').textContent = list.filter(p=>p._d.varPct<0).length;
  const tot = list.reduce((s,p)=>s+p._d.totalIng,0);
  document.getElementById('s-ing').textContent = 'Gs '+new Intl.NumberFormat('es-PY',{maximumFractionDigits:0}).format(tot);
}

/* ═══════════════════════════════ VIEW SWITCH ═══════════════════════════════ */
function switchView(v) {
  currentView = v;
  document.getElementById('btn-cards').classList.toggle('active',v==='cards');
  document.getElementById('btn-table').classList.toggle('active',v==='table');
  document.getElementById('cards-view').style.display = v==='cards'?'':'none';
  document.getElementById('table-view').style.display = v==='table'?'block':'none';
  render();
}

/* ═══════════════════════════════ MAIN RENDER ═══════════════════════════════ */
function render() {
  const list = getFiltered();
  const rcount = document.getElementById('rcount');
  rcount.innerHTML = `Mostrando <span>${list.length}</span> de ${RAW.personas.length} guardias &nbsp;·&nbsp; ${selectedMonths.size} meses seleccionados`;
  updateHeaderStats(list);
  if(currentView==='cards') renderCards(list);
  else renderTable(list);
}

/* ═══════════════════════════════ CARDS ═══════════════════════════════ */
function renderCards(list) {
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if(!list.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  const active = getActivePeriodos();
  let globalMax=0;
  RAW.personas.forEach(p=>active.forEach(per=>{const v=p.meses[per]?.ingresos??0;if(v>globalMax)globalMax=v;}));

  grid.innerHTML = list.map(p=>{
    const d=p._d; const id='c-'+slug(p.nombre);
    const vc = d.varPct>0?'b-up':d.varPct<0?'b-down':'b-neutral';
    const vs = d.varPct===0?'—':(d.varPct>0?'+':'')+d.varPct+'%';

    const cells = active.map((per,i)=>{
      const m=p.meses[per]; const idx=ALL_PERIODOS.indexOf(per);
      if(!m) return `<div class="sp-cell empty"><div class="sp-lbl">${ALL_LABELS[idx]}</div><div class="sp-htt">—</div><div class="sp-ing">—</div><div class="bar-bg"></div></div>`;
      const pct=Math.round((m.ingresos/globalMax)*100);
      const bc=d.varPct>=0?'#4fffb0':'#ff6b6b';
      return `<div class="sp-cell"><div class="sp-lbl">${ALL_LABELS[idx]}</div><div class="sp-htt">${m.htt}h</div><div class="sp-ing">Gs ${new Intl.NumberFormat('es-PY',{maximumFractionDigits:0}).format(m.ingresos)}</div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${bc}"></div></div></div>`;
    }).join('');

    return `<div class="card" id="${id}" onclick="toggleCard('${id}')">
      <div class="card-hdr"><div class="card-name">${p.nombre}</div><span class="badge ${vc}">${vs}</span></div>
      <div class="card-spark">${cells}</div>
      <div class="card-detail" onclick="event.stopPropagation()">
        <div class="det-stats">
          <div class="dstat"><div class="dstat-val">${fmtM(d.totalIng)}</div><div class="dstat-lbl">Total Ingresos</div></div>
          <div class="dstat"><div class="dstat-val">${fmtM(d.totalNeto)}</div><div class="dstat-lbl">Total Neto</div></div>
          <div class="dstat"><div class="dstat-val">${d.totalHtt.toFixed(0)}h</div><div class="dstat-lbl">Total Horas</div></div>
          <div class="dstat"><div class="dstat-val">${d.monthsCount}</div><div class="dstat-lbl">Meses activos</div></div>
        </div>
        <div class="det-tabs">
          <button class="dtab active" data-t="ingresos" onclick="swTab('${id}','ingresos')">Ingresos</button>
          <button class="dtab" data-t="neto" onclick="swTab('${id}','neto')">Neto</button>
          <button class="dtab" data-t="horas" onclick="swTab('${id}','horas')">Horas</button>
        </div>
        <div class="chart-wrap"><canvas></canvas></div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  const card=document.getElementById(id); if(!card)return;
  const was=card.classList.contains('expanded');
  document.querySelectorAll('.card.expanded').forEach(c=>{
    c.classList.remove('expanded');
    if(charts[c.id]){charts[c.id].destroy();delete charts[c.id];}
  });
  if(!was){card.classList.add('expanded');drawChart(id,'ingresos');}
}

function swTab(id,tab) {
  const card=document.getElementById(id);
  card.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  card.querySelector(`.dtab[data-t="${tab}"]`).classList.add('active');
  if(charts[id]){charts[id].destroy();delete charts[id];}
  drawChart(id,tab);
}

function drawChart(id,tab) {
  const card=document.getElementById(id); if(!card)return;
  const nombre=id.replace('c-','');
  const p=RAW.personas.find(x=>slug(x.nombre)===nombre); if(!p)return;
  const active=getActivePeriodos();
  const labels=active.map(per=>ALL_LABELS[ALL_PERIODOS.indexOf(per)]);
  const vals=active.map(per=>{
    const m=p.meses[per];
    if(!m)return null;
    return tab==='horas'?m.htt:tab==='neto'?m.neto:m.ingresos;
  });
  const color=tab==='horas'?'#f7c948':tab==='neto'?'#a78bfa':'#4fffb0';
  const lbl=tab==='horas'?'Horas':tab==='neto'?'Neto a Pagar':'Total Ingresos';
  const isH=tab==='horas';
  charts[id]=new Chart(card.querySelector('canvas').getContext('2d'),{
    type:'line',
    data:{labels,datasets:[{label:lbl,data:vals,borderColor:color,backgroundColor:color+'18',borderWidth:2,pointBackgroundColor:color,pointRadius:4,fill:true,tension:.35,spanGaps:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1f2e',borderColor:'#252d3d',borderWidth:1,titleColor:'#e8eaf0',bodyColor:'#6b7494',padding:10,callbacks:{label:c=>isH?c.parsed.y+'h':'Gs '+fmt(c.parsed.y)}}},scales:{x:{grid:{color:'#1e2535'},ticks:{color:'#6b7494',font:{family:'DM Mono',size:9}}},y:{grid:{color:'#1e2535'},ticks:{color:'#6b7494',font:{family:'DM Mono',size:9},callback:v=>isH?v+'h':(v/1e6).toFixed(1)+'M'}}}}
  });
}

/* ═══════════════════════════════ TABLE ═══════════════════════════════ */
function renderTable(list) {
  const tbl=document.getElementById('tbl');
  const empt=document.getElementById('empty-tbl');
  const active=getActivePeriodos();

  if(!list.length){tbl.style.display='none';empt.style.display='block';return;}
  tbl.style.display='table'; empt.style.display='none';

  // THEAD — columns: Nombre + one col per active month + Totals
  const thMeses = active.map((per,i)=>`<th onclick="sortTable('ing-${per}')">${ALL_LABELS[ALL_PERIODOS.indexOf(per)]}</th>`).join('');
  tbl.querySelector('thead').innerHTML=`<tr>
    <th onclick="sortTable('nombre')" class="${tblSortCol==='nombre'?'sort-'+tblSortDir:''}">Guardia</th>
    ${thMeses}
    <th onclick="sortTable('totalIng')" class="${tblSortCol==='totalIng'?'sort-'+tblSortDir:''}">Total Ing.</th>
    <th onclick="sortTable('totalNeto')" class="${tblSortCol==='totalNeto'?'sort-'+tblSortDir:''}">Total Neto</th>
    <th onclick="sortTable('totalHtt')" class="${tblSortCol==='totalHtt'?'sort-'+tblSortDir:''}">Total Hs</th>
    <th onclick="sortTable('varPct')" class="${tblSortCol==='varPct'?'sort-'+tblSortDir:''}">Variación</th>
  </tr>`;

  // Apply table sort
  let sorted=[...list];
  if(tblSortCol==='nombre') sorted.sort((a,b)=>tblSortDir==='asc'?a.nombre.localeCompare(b.nombre):b.nombre.localeCompare(a.nombre));
  else if(tblSortCol==='totalIng') sorted.sort((a,b)=>tblSortDir==='asc'?a._d.totalIng-b._d.totalIng:b._d.totalIng-a._d.totalIng);
  else if(tblSortCol==='totalNeto') sorted.sort((a,b)=>tblSortDir==='asc'?a._d.totalNeto-b._d.totalNeto:b._d.totalNeto-a._d.totalNeto);
  else if(tblSortCol==='totalHtt') sorted.sort((a,b)=>tblSortDir==='asc'?a._d.totalHtt-b._d.totalHtt:b._d.totalHtt-a._d.totalHtt);
  else if(tblSortCol==='varPct') sorted.sort((a,b)=>tblSortDir==='asc'?a._d.varPct-b._d.varPct:b._d.varPct-a._d.varPct);

  // TBODY
  tbl.querySelector('tbody').innerHTML = sorted.map(p=>{
    const d=p._d;
    const mesCells=active.map(per=>{
      const m=p.meses[per];
      return m?`<td>Gs ${new Intl.NumberFormat('es-PY',{maximumFractionDigits:0}).format(m.ingresos)}</td>`:`<td style="color:var(--muted2)">—</td>`;
    }).join('');
    const vc=d.varPct>0?'up':d.varPct<0?'down':'';
    const vs=d.varPct===0?'—':(d.varPct>0?'+':'')+d.varPct+'%';
    return `<tr>
      <td title="${p.nombre}">${p.nombre}</td>
      ${mesCells}
      <td>${fmtM(d.totalIng)}</td>
      <td class="td-neto">${fmtM(d.totalNeto)}</td>
      <td>${d.totalHtt.toFixed(0)}h</td>
      <td class="td-var ${vc}">${vs}</td>
    </tr>`;
  }).join('');

  // TFOOT totals
  const sumIng=sorted.reduce((s,p)=>s+p._d.totalIng,0);
  const sumNeto=sorted.reduce((s,p)=>s+p._d.totalNeto,0);
  const sumHtt=sorted.reduce((s,p)=>s+p._d.totalHtt,0);
  const mesTotals=active.map(per=>{
    const t=sorted.reduce((s,p)=>s+(p.meses[per]?.ingresos??0),0);
    return `<td>Gs ${new Intl.NumberFormat('es-PY',{maximumFractionDigits:0}).format(t)}</td>`;
  }).join('');
  tbl.querySelector('tfoot').innerHTML=`<tr>
    <td>TOTALES (${sorted.length} guardias)</td>
    ${mesTotals}
    <td>${fmtM(sumIng)}</td>
    <td>${fmtM(sumNeto)}</td>
    <td>${sumHtt.toFixed(0)}h</td>
    <td>—</td>
  </tr>`;
}

function sortTable(col) {
  if(tblSortCol===col) tblSortDir=tblSortDir==='asc'?'desc':'asc';
  else{tblSortCol=col;tblSortDir='desc';}
  render();
}

/* ═══════════════════════════════ INIT ═══════════════════════════════ */
buildPills();
render();
</script>
</body>
</html>
